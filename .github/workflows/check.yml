name: Banus Checker

on:
  repository_dispatch:
    types: [run-checker]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Install Chrome
        run: npx puppeteer browsers install chrome

      - name: Run checker
        run: node check.js
        env:
          AFTER_DATE: ${{ github.event.client_payload.after_date }}
          CONVERSATION_ID: ${{ github.event.client_payload.conversation_id }}
